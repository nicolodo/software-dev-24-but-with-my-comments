<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lovely Gallery</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="thumbnail-container" id="thumbnailContainer"></div>
    <div class="big-container" id="bigContainer" aria-live="assertive"></div>
    <button class="toggle" id="toggle">^</button>
    <div class="buttons">
      <button id="leftBtn" aria-label="Previous image">&lt;</button>
      <button id="rightBtn" aria-label="Next image">&gt;</button>
    </div>
  </body>
</html>
